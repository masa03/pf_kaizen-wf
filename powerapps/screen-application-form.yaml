                                    Width: =120
                              - txtProblem:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Height: =110
                                    Mode: ='TextInputCanvas.Mode'.Multiline
                                    Value: =varEditProblem
                                    FillPortions: =1
                        - cntImprovement:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =120
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                            Children:
                              - lblImprovement:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =30
                                    Size: =13
                                    Text: ="改善内容 *"
                                    Width: =120
                              - txtImprovement:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Height: =110
