            Width: =Parent.Width
          Children:
            - cntConfirmDialog:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.Center
                  DropShadow: =DropShadow.Bold
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =20
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  PaddingBottom: =24
                  PaddingLeft: =32
                  PaddingRight: =32
                  PaddingTop: =24
                  RadiusBottomLeft: =12
                  RadiusBottomRight: =12
                  RadiusTopLeft: =12
                  RadiusTopRight: =12
                  Width: =400
                Children:
                  - lblConfirmTitle:
                      Control: Text@0.0.51
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        Size: =18
                        Text: =If(varConfirmAction = "submitted", "完了", "確認")
                        Weight: ='TextCanvas.Weight'.Bold
                        Width: =Parent.Width - 64
                  - lblConfirmMessage:
                      Control: Text@0.0.51
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        Text: =If(varConfirmAction = "submitted", "提出しました", "この改善提案を提出しますか？")
                        Width: =Parent.Width - 64
                  - cntConfirmButtons:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =50
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =16
                        LayoutJustifyContent: =LayoutJustifyContent.Center
                      Children:
                        - btnConfirmCancel:
                            Control: Button@0.0.45
                            Properties:
                              Appearance: ='ButtonCanvas.Appearance'.Secondary
                              Height: =40
                              OnSelect: =Set(varShowConfirmPopup, false)
                              Text: ="キャンセル"
                              Visible: =varConfirmAction <> "submitted"
                              Width: =130
                        - btnConfirmOK:
                            Control: Button@0.0.45
                            Properties:
                              Appearance: ='ButtonCanvas.Appearance'.Primary
                              Height: =40
                              OnSelect: |
                                =Set(varShowConfirmPopup, false);
                                If(
                                    varConfirmAction = "submitted",
                                    // 提出完了 → 閲覧画面へ遷移
                                    Set(varViewRequestID, varSubmittedRequestID);
                                    Set(varViewMode, "View");
                                    Navigate(ViewScreen, ScreenTransition.None),
                                    // 提出確認 → 実処理実行
                                    Set(varConfirmed, true);
                                    Select(btnSubmit)
                                )
                              Text: =If(varConfirmAction = "submitted", "確認", "提出する")
                              Width: =130
