                            Properties:
                              FillPortions: =0
                              Height: =44
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =8
                              Width: |
                                =400
                            Children:
                              - txtMemberGID:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Height: =36
                                    Placeholder: ="GID（10桁）を入力"
