                                =Set(varShowPickerPopup, false);
                                Reset(txtPickerSearch)
                              Text: ="×"
                              Width: =40
                  - txtPickerSearch:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        Default: =
                        Height: =36
                        HintText: ="氏名またはGIDを入力"
                        Width: =432
                  - galPickerSuggest:
                      Control: Gallery@2.15.0
                      Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
                      Properties:
                        Height: =320
                        Items: |
                          =If(
                              IsBlank(txtPickerSearch.Text),
                              Blank(),
                              IsMatch(txtPickerSearch.Text, "\d+", MatchOptions.Complete),
                              FirstN(
                                  Filter(社員マスタ, GID = txtPickerSearch.Text And IsActive = true),
                                  10
                              ),
                              FirstN(
                                  Filter(社員マスタ, IsActive = true, StartsWith(EmployeeName, txtPickerSearch.Text)),
                                  10
                              )
                          )
                        TemplateFill: |
                          =If(ThisItem.IsSelected, RGBA(230, 240, 255, 1), RGBA(255, 255, 255, 1))
                        TemplateSize: =36
                        Visible: =!IsBlank(txtPickerSearch.Text)
                        Width: =432
                      Children:
                        - cntPickerRow:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              Height: =Parent.TemplateHeight
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =6
                              PaddingLeft: =8
                              PaddingRight: =8
                              Width: =Parent.TemplateWidth
                            Children:
                              - lblPickerName:
                                  Control: Label@2.5.1
                                  Properties:
                                    FillPortions: =1
                                    Height: =Parent.Height
                                    OnSelect: |
                                      =Switch(
                                          varPickerTarget,
                                          "member",
                                          If(
                                              CountRows(colMembers) >= 10,
                                              Notify("メンバーは最大10名までです", NotificationType.Warning),
                                              !IsBlank(LookUp(colMembers, MemberGID = ThisItem.GID)),
                                              Notify("この社員は既に追加されています", NotificationType.Warning),
                                              Collect(
                                                  colMembers,
                                                  {
                                                      MemberGID: ThisItem.GID,
                                                      MemberName: ThisItem.EmployeeName,
                                                      MemberOffice: ThisItem.Office,
                                                      MemberCostUnit: ThisItem.CostUnit,
                                                      MemberSection: ThisItem.Section,
                                                      SortOrder: CountRows(colMembers) + 1
                                                  }
                                              );
                                              Notify(ThisItem.EmployeeName & " を追加しました", NotificationType.Success);
                                              Set(varShowPickerPopup, false);
                                              Reset(txtPickerSearch)
                                          ),
                                          "reviewer",
                                          If(
                                              CountRows(colReviewers) >= 5,
                                              Notify("回覧メンバーは最大5名までです", NotificationType.Warning),
                                              !IsBlank(LookUp(colReviewers, ReviewerGID = ThisItem.GID)),
                                              Notify("同じ人が既に追加されています", NotificationType.Warning),
                                              ThisItem.GID = gCurrentGID,
                                              Notify("申請者自身は回覧メンバーに指定できません", NotificationType.Warning),
                                              ThisItem.GID = varEval1GID || ThisItem.GID = varEval2GID,
                                              Notify("評価者は回覧メンバーに指定できません", NotificationType.Warning),
                                              Collect(
                                                  colReviewers,
                                                  {
                                                      ReviewerGID: ThisItem.GID,
                                                      ReviewerName: ThisItem.EmployeeName,
                                                      ReviewerEmail: ThisItem.Email,
                                                      ReviewerSection: ThisItem.Section,
                                                      ReviewOrder: CountRows(colReviewers) + 1
                                                  }
                                              );
                                              Notify(ThisItem.EmployeeName & " を追加しました", NotificationType.Success);
                                              Set(varShowPickerPopup, false);
                                              Reset(txtPickerSearch)
                                          ),
                                          "eval1",
                                          If(
                                              ThisItem.GID = gCurrentGID,
                                              Notify("自分自身を評価者に設定することはできません", NotificationType.Warning),
                                              ThisItem.GID = varEval2GID,
                                              Notify("2人目の評価者と同じ人は設定できません", NotificationType.Warning),
                                              Set(varEval1GID, ThisItem.GID);
                                              Set(varEval1Name, ThisItem.EmployeeName);
                                              Set(varEval1Email, ThisItem.Email);
                                              Set(varEval1Title, ThisItem.Position);
                                              Set(varEval1IsNone, false);
                                              Set(varShowPickerPopup, false);
                                              Reset(txtPickerSearch)
                                          ),
                                          "eval2",
                                          If(
                                              ThisItem.GID = gCurrentGID,
                                              Notify("自分自身を評価者に設定することはできません", NotificationType.Warning),
                                              ThisItem.GID = varEval1GID && !varEval1IsNone,
                                              Notify("1人目の評価者と同じ人は設定できません", NotificationType.Warning),
                                              Set(varEval2GID, ThisItem.GID);
                                              Set(varEval2Name, ThisItem.EmployeeName);
                                              Set(varEval2Email, ThisItem.Email);
                                              Set(varEval2Title, ThisItem.Position);
                                              Set(varShowPickerPopup, false);
                                              Reset(txtPickerSearch)
                                          )
                                      )
                                    Text: =ThisItem.EmployeeName
                              - lblPickerBu:
