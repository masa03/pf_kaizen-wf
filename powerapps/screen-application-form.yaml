                            Properties:
                              BorderColor: =RGBA(200, 200, 200, 1)
                              FillPortions: =0
                              Height: =CountRows(colMembers) * 44
                              Items: =Sort(colMembers, SortOrder, SortOrder.Ascending)
                              LayoutMinHeight: =16
                              LayoutMinWidth: =16
                              TemplateSize: =42
                              Width: =Parent.Width
                            Children:
                              - cntMemberRow:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    Height: =Parent.TemplateHeight - 1
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =20
                                    PaddingLeft: =8
                                    PaddingRight: =8
                                    Width: =Parent.TemplateWidth
                                  Children:
                                    - lblRowNumber:
                                        Control: Text@0.0.51
                                        Properties:
                                          Height: =30
                                          Size: =12
                                          Text: =Text(ThisItem.SortOrder)
                                          Width: =24
                                    - lblRowGID:
                                        Control: Text@0.0.51
                                        Properties:
                                          Height: =30
                                          Size: =12
                                          Text: =ThisItem.MemberGID
                                          Width: =100
                                    - lblRowName:
                                        Control: Text@0.0.51
                                        Properties:
                                          Height: =30
                                          Size: =12
                                          Text: =ThisItem.MemberName
                                    - icnRemoveMember:
                                        Control: Classic/Icon@2.5.0
                                        Properties:
                                          BorderColor: =RGBA(0, 0, 0, 1)
                                          Color: =RGBA(166, 166, 166, 1)
                                          Height: =28
                                          Icon: =Icon.Cancel
                                          OnSelect: |
                                            =Remove(colMembers, ThisItem);
                                            ForAll(
                                                Filter(colMembers, SortOrder > ThisItem.SortOrder),
                                                Patch(
                                                    colMembers,
                                                    ThisRecord,
                                                    {SortOrder: ThisRecord.SortOrder - 1}
                                                )
                                            )
                                          PaddingBottom: =6
                                          PaddingLeft: =6
                                          PaddingRight: =6
                                          PaddingTop: =6
                                          Width: =28
                              - sepMember:
                                  Control: Rectangle@2.3.0
                                  Properties:
                                    BorderColor: =RGBA(200, 200, 200, 1)
                                    Fill: =RGBA(240, 240, 240, 1)
                                    Height: =1
                                    OnSelect: =Select(Parent)
                                    Width: =Parent.TemplateWidth
                                    Y: =Parent.TemplateHeight - Self.Height
                        - btnClearMembers:
                            Control: Button@0.0.45
                            Properties:
                              Appearance: ='ButtonCanvas.Appearance'.Secondary
                              DisplayMode: |
                                =If(
                                    CountRows(colMembers) = 0,
                                    DisplayMode.Disabled,
                                    DisplayMode.Edit
                                )
                              OnSelect: =Clear(colMembers)
                              Text: ="全てクリア"
                              Width: =120
