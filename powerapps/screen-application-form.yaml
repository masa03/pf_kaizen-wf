                                          Align: ="End"
                                          FillPortions: =1
                                          Height: =28
                                          PaddingRight: =20
                                          Text: |
                                            ="効果金額合計: " & Text(Sum(colCategories, EffectAmount), "#,##0") & " 円/月"
                                          Weight: ='TextCanvas.Weight'.Bold
                                          Width: =Parent.Width
                                          X: =40
                                          Y: =40
                              - galCategories:
                                  Control: Gallery@2.15.0
                                  Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
                                  Properties:
                                    FillPortions: =0
                                    Height: =CountRows(colCategories) * 44
                                    Items: =Sort(colCategories, SortOrder, SortOrder.Ascending)
                                    LayoutMinHeight: =16
                                    LayoutMinWidth: =16
                                    TemplateSize: =42
                                    Visible: =CountRows(colCategories) > 0
                                    Width: =Parent.Width
                                  Children:
                                    - cntCatRow:
                                        Control: GroupContainer@1.5.0
                                        Variant: AutoLayout
                                        Properties:
                                          Height: =Parent.TemplateHeight
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          LayoutGap: =8
                                          PaddingLeft: =8
                                          PaddingRight: =8
                                          Width: =Parent.TemplateWidth
                                        Children:
                                          - lblCatNum:
                                              Control: Text@0.0.51
                                              Properties:
                                                Height: =30
                                                Size: =12
                                                Text: =Text(ThisItem.SortOrder)
                                                Width: =24
                                          - lblCatName:
                                              Control: Text@0.0.51
                                              Properties:
                                                FillPortions: =4
                                                Height: =30
                                                Size: =12
                                                Text: =ThisItem.CategoryName
                                          - lblCatActual:
                                              Control: Text@0.0.51
                                              Properties:
                                                Align: ='TextCanvas.Align'.End
                                                Height: =30
                                                Size: =12
                                                Text: |
                                                  =Text(ThisItem.ActualValue, "#,##0.0") & " " & ThisItem.Unit
                                                Visible: =ThisItem.CategoryType = "金額算出"
                                                Width: =80
                                          - lblCatRate:
                                              Control: Text@0.0.51
                                              Properties:
                                                Align: ='TextCanvas.Align'.End
                                                FontColor: =RGBA(120, 120, 120, 1)
                                                Height: =30
                                                Size: =10
                                                Text: |
                                                  ="(" & Text(ThisItem.ConversionRate, "#,##0") & " 円/" & Substitute(ThisItem.Unit, "/月", "") & ")"
                                                Visible: =ThisItem.CategoryType = "金額算出"
                                                Width: =120
                                          - lblCatAmt:
                                              Control: Text@0.0.51
                                              Properties:
                                                Align: ='TextCanvas.Align'.End
                                                Height: =30
                                                Size: =12
                                                Text: |
                                                  =If(
                                                      ThisItem.CategoryType = "テキスト",
                                                      ThisItem.Comment,
                                                      Text(ThisItem.EffectAmount, "#,##0") & " 円/月"
                                                  )
                                                Width: =150
                                          - icnCatDel:
                                              Control: Classic/Icon@2.5.0
                                              Properties:
                                                BorderColor: =RGBA(0, 0, 0, 1)
                                                Color: =RGBA(166, 166, 166, 1)
                                                Height: =28
                                                Icon: =Icon.Cancel
                                                OnSelect: |
                                                  =With(
                                                      {delOrder: ThisItem.SortOrder},
                                                      Remove(colCategories, ThisItem);
                                                      ForAll(
                                                          Filter(colCategories, SortOrder > delOrder),
                                                          Patch(colCategories, ThisRecord, {SortOrder: ThisRecord.SortOrder - 1})
                                                      )
                                                  )
                                                PaddingBottom: =6
                                                PaddingLeft: =6
                                                PaddingRight: =6
                                                PaddingTop: =6
                                                Width: =28
                              - cntCategoryAdd:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    FillPortions: =0
                                    Height: =44
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =8
                                  Children:
                                    - ddCategorySelect:
                                        Control: DropDown@0.0.45
                                        Properties:
                                          Height: =36
                                          Items: |
                                            =Sort(
                                                Filter(
                                                    colCategoryMaster,
                                                    !(CategoryCode in colCategories.CategoryCode)
                                                ),
                                                SortOrder,
                                                SortOrder.Ascending
                                            )
                                          Width: =400
                                        Children:
                                          - ddCategorySelectField:
                                              Control: DropDownDataField@1.5.0
                                              Variant: textualColumn
                                              Properties:
                                                FieldDisplayName: ="CategoryName"
                                                FieldName: ="CategoryName"
                                                FieldType: ="s"
                                                Order: =1
                                    - btnAddCategory:
                                        Control: Button@0.0.45
                                        Properties:
                                          DisplayMode: |
                                            =If(
                                                IsBlank(ddCategorySelect.Selected),
                                                DisplayMode.Disabled,
                                                ddCategorySelect.Selected.CategoryType.Value = "テキスト",
                                                If(
                                                    IsBlank(txtCategoryComment.Value),
                                                    DisplayMode.Disabled,
                                                    DisplayMode.Edit
                                                ),
                                                If(
                                                    Value(numActualValue.Value) <= 0,
                                                    DisplayMode.Disabled,
                                                    DisplayMode.Edit
                                                )
                                            )
                                          Height: =36
                                          OnSelect: |
                                            =Set(
                                                varCalcAmount,
                                                If(
                                                    ddCategorySelect.Selected.CategoryType.Value = "金額算出",
                                                    If(
                                                        ddCategorySelect.Selected.CategoryCode = "CAT-06",
                                                        Value(numWIPAmount.Value),
                                                        Value(numActualValue.Value) * Value(numConversionRate.Value)
                                                    ),
                                                    ddCategorySelect.Selected.CategoryType.Value = "直接入力",
                                                    Value(numActualValue.Value),
                                                    0
                                                )
                                            );
                                            Collect(
                                                colCategories,
                                                {
                                                    CategoryCode: ddCategorySelect.Selected.CategoryCode,
                                                    CategoryName: ddCategorySelect.Selected.CategoryName,
                                                    CategoryType: ddCategorySelect.Selected.CategoryType.Value,
                                                    Unit: ddCategorySelect.Selected.Unit,
                                                    ConversionRate: If(
                                                        ddCategorySelect.Selected.CategoryType.Value = "金額算出",
                                                        If(
                                                            ddCategorySelect.Selected.CategoryCode = "CAT-06",
                                                            Value(numWIPAmount.Value),
                                                            Value(numConversionRate.Value)
                                                        ),
                                                        0
                                                    ),
                                                    ActualValue: If(
                                                        ddCategorySelect.Selected.CategoryType.Value = "テキスト",
                                                        0,
                                                        Value(numActualValue.Value)
                                                    ),
                                                    WIPAmount: If(
                                                        ddCategorySelect.Selected.CategoryCode = "CAT-06",
                                                        Value(numWIPAmount.Value),
                                                        0
                                                    ),
                                                    Comment: If(
                                                        ddCategorySelect.Selected.CategoryType.Value = "テキスト",
                                                        txtCategoryComment.Value,
                                                        ""
                                                    ),
                                                    EffectAmount: varCalcAmount,
