# ============================================================
# 申請フォーム画面（ApplicationFormScreen）
# タスク: 2-1（左カラム: 基本情報）, 2-2（右カラム: 改善メンバー）
# Power Apps Studio Code View からエクスポートした YAML
# ============================================================

Screens:
  ApplicationFormScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - cntRoot:
          Control: GroupContainer@1.4.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            LayoutDirection: =LayoutDirection.Vertical
            Width: =Parent.Width
          Children:
            - cntTestHeader:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 200, 200, 1)
                  FillPortions: =0
                  Height: =44
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =10
                  PaddingLeft: =20
                  PaddingRight: =20
                  Visible: =gTestMode
                  Width: =Parent.Width
                Children:
                  - lblTestBadge:
                      Control: Text@0.0.51
                      Properties:
                        FontColor: =RGBA(180, 0, 0, 1)
                        Height: =30
                        Text: ="【テストモード】"
                        Weight: ='TextCanvas.Weight'.Bold
                        Width: =160
                  - lblTestGIDLabel:
                      Control: Text@0.0.51
                      Properties:
                        Height: =30
                        Text: ="GID入力"
                        Width: =80
                  - txtTestGID:
                      Control: TextInput@0.0.54
                      Properties:
                        Placeholder: ="10桁のGIDを入力"
                        Width: =200
                  - btnTestConfirm:
                      Control: Button@0.0.45
                      Properties:
                        OnSelect: |
                          =Set(gCurrentEmployee, LookUp(社員マスタ, GID = txtTestGID.Value));
                          If(
                              IsBlank(gCurrentEmployee),
                              Notify("社員情報が見つかりません", NotificationType.Error),
                              Set(gCurrentGID, gCurrentEmployee.GID);
                              Set(gCurrentName, gCurrentEmployee.EmployeeName);
                              Set(gCurrentDept, gCurrentEmployee.Department);
                              Set(gCurrentBu, gCurrentEmployee.Bu);
                              Set(gCurrentSection, gCurrentEmployee.Section);
                              Set(gCurrentEmail, gCurrentEmployee.Email);
                              Set(gIsManager, gCurrentEmployee.IsManager);
                              Set(gManagerGID, gCurrentEmployee.ManagerGID);
                              Set(gManagerName, gCurrentEmployee.ManagerName);
                              Set(gDirectorGID, gCurrentEmployee.DirectorGID);
                              Set(gDirectorName, gCurrentEmployee.DirectorName);
                              Set(gIsManagement, gCurrentEmployee.IsManagement);
                              Notify("取得完了" & gCurrentName, NotificationType.Success)
                          )
                        Text: ="確定"
                        Width: =80
            - cntMain:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =20
                  PaddingBottom: =20
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =20
                  Width: =Parent.Width
                Children:
                  - cntLeftColumn:
                      Control: GroupContainer@1.4.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.Semilight
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =0
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                        LayoutOverflowY: =LayoutOverflow.Scroll
                        PaddingBottom: =20
                        PaddingLeft: =20
                        PaddingRight: =20
                        PaddingTop: =20
                        Width: =640
                      Children:
                        - lblFormTitle:
                            Control: Text@0.0.51
                            Properties:
                              Height: =40
                              Size: =22
                              Text: ="改善提案 申請フォーム"
                              Weight: ='TextCanvas.Weight'.Bold
                              Width: =Parent.Width
                        - cntApplicantEmail:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =36
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                            Children:
                              - lblApplicantEmail:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =30
                                    Size: =13
                                    Text: ="申請者メール"
                                    Width: =120
                              - txtApplicantEmail:
                                  Control: Text@0.0.51
                                  Properties:
                                    Fill: =RGBA(240, 240, 240, 1)
                                    Height: =30
                                    Size: =13
                                    Text: =If(gTestMode, gCurrentEmail, User().Email)
                                    Width: =400
                        - cntApplicantGID:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =36
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                            Children:
                              - lblApplicantGID:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =30
                                    Size: =13
                                    Text: ="申請者GID"
                                    Width: =120
                              - txtApplicantGID:
                                  Control: Text@0.0.51
                                  Properties:
                                    Fill: =RGBA(240, 240, 240, 1)
                                    Height: =30
                                    Size: =13
                                    Text: =gCurrentGID
                                    Width: =400
                        - cntApplicantName:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =36
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                            Children:
                              - lblApplicantName:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =30
                                    Size: =13
                                    Text: ="申請者氏名"
                                    Width: =120
                              - txtApplicantName:
                                  Control: Text@0.0.51
                                  Properties:
                                    Fill: =RGBA(240, 240, 240, 1)
                                    Height: =30
                                    Size: =13
                                    Text: =gCurrentName
                                    Width: =400
                        - cntAwardCategory:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =40
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                            Children:
                              - lblAwardCategory:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =30
                                    Size: =13
                                    Text: ="表彰区分 *"
                                    Width: =120
                              - ddAwardCategory:
                                  Control: DropDown@0.0.45
                                  Properties:
                                    Height: =36
                                    Items: =Filter(表彰区分マスタ, IsActive = true)
                                    Width: =400
                                  Children:
                                    - ddAwardCategoryField:
                                        Control: DropDownDataField@1.5.0
                                        Variant: textualColumn
                                        Properties:
                                          FieldDisplayName: ="AwardName"
                                          FieldName: ="AwardName"
                                          FieldType: ="s"
                                          Order: =1
                        - cntDept:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =36
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                            Children:
                              - lblDept:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =30
                                    Size: =13
                                    Text: ="TEC"
                                    Width: =120
                              - txtDept:
                                  Control: Text@0.0.51
                                  Properties:
                                    Fill: =RGBA(240, 240, 240, 1)
                                    Height: =30
                                    Size: =13
                                    Text: =gCurrentDept
                                    Width: =400
                        - cntBu:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =36
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                            Children:
                              - lblBu:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =30
                                    Size: =13
                                    Text: ="部"
                                    Width: =120
                              - txtBu:
                                  Control: Text@0.0.51
                                  Properties:
                                    Fill: =RGBA(240, 240, 240, 1)
                                    Height: =30
                                    Size: =13
                                    Text: =gCurrentBu
                                    Width: =400
                        - cntSection:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =36
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                            Children:
                              - lblSection:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =30
                                    Size: =13
                                    Text: ="課"
                                    Width: =120
                              - txtSection:
                                  Control: Text@0.0.51
                                  Properties:
                                    Fill: =RGBA(240, 240, 240, 1)
                                    Height: =30
                                    Size: =13
                                    Text: =gCurrentSection
                                    Width: =400
                        - cntUnit:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =40
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                            Children:
                              - lblUnit:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =30
                                    Size: =13
                                    Text: ="係"
                                    Width: =120
                              - txtUnit:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Height: =36
                                    Width: =400
                        - cntTheme:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =40
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                            Children:
                              - lblTheme:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =30
                                    Size: =13
                                    Text: ="改善テーマ *"
                                    Width: =120
                              - txtTheme:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Height: =36
                                    Width: =400
                        - cntProblem:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =100
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                            Children:
                              - lblProblem:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =30
                                    Size: =13
                                    Text: ="問題点 *"
                                    Width: =120
                              - txtProblem:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Height: =90
                                    Mode: ='TextInputCanvas.Mode'.Multiline
                                    Width: =400
                        - cntImprovement:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =100
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                            Children:
                              - lblImprovement:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =30
                                    Size: =13
                                    Text: ="改善内容 *"
                                    Width: =120
                              - txtImprovement:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Height: =90
                                    Mode: ='TextInputCanvas.Mode'.Multiline
                                    Width: =400
                        - cntCompletionDate:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =40
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                            Children:
                              - lblCompletionDate:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =30
                                    Size: =13
                                    Text: ="改善完了日 *"
                                    Width: =120
                              - dpCompletionDate:
                                  Control: DatePicker@0.0.46
                                  Properties:
                                    Height: =36
                                    Width: =400
                        - cntCategorySection:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =8
                              Height: |
                                =130
                                + If(
                                    !IsBlank(ddCategorySelect.Selected),
                                    If(
                                        ddCategorySelect.Selected.CategoryType.Value = "テキスト",
                                        108,
                                        ddCategorySelect.Selected.CategoryCode = "CAT-06",
                                        188,
                                        138
                                    ),
                                    0
                                )
                                + If(
                                    CountRows(colCategories) > 0,
                                    CountRows(colCategories) * 42 + 8,
                                    0
                                )
                              PaddingTop: =10
                            Children:
                              - lblCategoryTitle:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =32
                                    Size: =16
                                    Text: ="改善分野実績"
                                    Weight: ='TextCanvas.Weight'.Bold
                                    Width: =Parent.Width
                              - cntCategoryAdd:
                                  Control: GroupContainer@1.4.0
                                  Variant: AutoLayout
                                  Properties:
                                    FillPortions: =0
                                    Height: =44
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =8
                                  Children:
                                    - ddCategorySelect:
                                        Control: DropDown@0.0.45
                                        Properties:
                                          Height: =36
                                          Items: |
                                            =Filter(
                                                colCategoryMaster,
                                                !(CategoryCode in colCategories.CategoryCode)
                                            )
                                          Width: =400
                                        Children:
                                          - ddCategorySelectField:
                                              Control: DropDownDataField@1.5.0
                                              Variant: textualColumn
                                              Properties:
                                                FieldDisplayName: ="CategoryName"
                                                FieldName: ="CategoryName"
                                                FieldType: ="s"
                                                Order: =1
                                    - btnAddCategory:
                                        Control: Button@0.0.45
                                        Properties:
                                          DisplayMode: |
                                            =If(
                                                IsBlank(ddCategorySelect.Selected),
                                                DisplayMode.Disabled,
                                                ddCategorySelect.Selected.CategoryType.Value = "テキスト",
                                                If(
                                                    IsBlank(txtCategoryComment.Value),
                                                    DisplayMode.Disabled,
                                                    DisplayMode.Edit
                                                ),
                                                If(
                                                    Value(numActualValue.Value) <= 0,
                                                    DisplayMode.Disabled,
                                                    DisplayMode.Edit
                                                )
                                            )
                                          Height: =36
                                          OnSelect: |
                                            =Set(
                                                varCalcAmount,
                                                If(
                                                    ddCategorySelect.Selected.CategoryType.Value = "金額算出",
                                                    If(
                                                        ddCategorySelect.Selected.CategoryCode = "CAT-06",
                                                        Value(numActualValue.Value) * Value(numWIPAmount.Value),
                                                        Value(numActualValue.Value) * ddCategorySelect.Selected.ConversionRate
                                                    ),
                                                    ddCategorySelect.Selected.CategoryType.Value = "直接入力",
                                                    Value(numActualValue.Value),
                                                    0
                                                )
                                            );
                                            Collect(
                                                colCategories,
                                                {
                                                    CategoryCode: ddCategorySelect.Selected.CategoryCode,
                                                    CategoryName: ddCategorySelect.Selected.CategoryName,
                                                    CategoryType: ddCategorySelect.Selected.CategoryType.Value,
                                                    Unit: ddCategorySelect.Selected.Unit,
                                                    ConversionRate: ddCategorySelect.Selected.ConversionRate,
                                                    ActualValue: If(
                                                        ddCategorySelect.Selected.CategoryType.Value = "テキスト",
                                                        0,
                                                        Value(numActualValue.Value)
                                                    ),
                                                    WIPAmount: If(
                                                        ddCategorySelect.Selected.CategoryCode = "CAT-06",
                                                        Value(numWIPAmount.Value),
                                                        0
                                                    ),
                                                    Comment: If(
                                                        ddCategorySelect.Selected.CategoryType.Value = "テキスト",
                                                        txtCategoryComment.Value,
                                                        ""
                                                    ),
                                                    EffectAmount: varCalcAmount,
                                                    SortOrder: CountRows(colCategories) + 1
                                                }
                                            );
                                            Reset(numActualValue);
                                            Reset(numWIPAmount);
                                            Reset(txtCategoryComment);
                                            Notify(
                                                ddCategorySelect.Selected.CategoryName & " を追加しました",
                                                NotificationType.Success
                                            )
                                          Text: ="追加"
                                          Width: =80
                              - cntCategoryInput:
                                  Control: GroupContainer@1.4.0
                                  Variant: AutoLayout
                                  Properties:
                                    Fill: =RGBA(248, 248, 248, 1)
                                    FillPortions: =0
                                    Height: |
                                      =If(
                                          ddCategorySelect.Selected.CategoryType.Value = "テキスト",
                                          100,
                                          ddCategorySelect.Selected.CategoryCode = "CAT-06",
                                          180,
                                          130
                                      )
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =6
                                    PaddingBottom: =10
                                    PaddingLeft: =10
                                    PaddingRight: =10
                                    PaddingTop: =10
                                    Visible: =!IsBlank(ddCategorySelect.Selected)
                                  Children:
                                    - lblCategoryInfo:
                                        Control: Text@0.0.51
                                        Properties:
                                          FontColor: =RGBA(80, 80, 80, 1)
                                          Height: =24
                                          Size: =12
                                          Text: =ddCategorySelect.Selected.CategoryName
                                          Width: =Parent.Width
                                    - cntActualValueRow:
                                        Control: GroupContainer@1.4.0
                                        Variant: AutoLayout
                                        Properties:
                                          FillPortions: =0
                                          Height: =40
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          LayoutGap: =10
                                          Visible: =ddCategorySelect.Selected.CategoryType.Value <> "テキスト"
                                        Children:
                                          - lblActualValueLabel:
                                              Control: Text@0.0.51
                                              Properties:
                                                Height: =30
                                                Size: =13
                                                Text: |
                                                  =If(
                                                      ddCategorySelect.Selected.CategoryType.Value = "直接入力",
                                                      "効果金額（円/月）",
                                                      "実績値（" & ddCategorySelect.Selected.Unit & "）"
                                                  )
                                                Width: =150
                                          - numActualValue:
                                              Control: TextInput@0.0.54
                                              Properties:
                                                Height: =36
                                                Placeholder: ="数値を入力"
                                                Width: =200
                                    - cntWIPRow:
                                        Control: GroupContainer@1.4.0
                                        Variant: AutoLayout
                                        Properties:
                                          FillPortions: =0
                                          Height: =40
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          LayoutGap: =10
                                          Visible: =ddCategorySelect.Selected.CategoryCode = "CAT-06"
                                        Children:
                                          - lblWIPLabel:
                                              Control: Text@0.0.51
                                              Properties:
                                                Height: =30
                                                Size: =13
                                                Text: ="仕掛り金額（円）"
                                                Width: =150
                                          - numWIPAmount:
                                              Control: TextInput@0.0.54
                                              Properties:
                                                Height: =36
                                                Placeholder: ="仕掛り金額を入力"
                                                Width: =200
                                    - cntCommentRow:
                                        Control: GroupContainer@1.4.0
                                        Variant: AutoLayout
                                        Properties:
                                          FillPortions: =0
                                          Height: =40
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          LayoutGap: =10
                                          Visible: =ddCategorySelect.Selected.CategoryType.Value = "テキスト"
                                        Children:
                                          - lblCommentLabel:
                                              Control: Text@0.0.51
                                              Properties:
                                                Height: =30
                                                Size: =13
                                                Text: ="効果内容"
                                                Width: =100
                                          - txtCategoryComment:
                                              Control: TextInput@0.0.54
                                              Properties:
                                                Height: =36
                                                Placeholder: ="効果内容を入力"
                                                Width: =400
                                    - lblCalcPreview:
                                        Control: Text@0.0.51
                                        Properties:
                                          FontColor: =RGBA(0, 100, 0, 1)
                                          Height: =24
                                          Size: =12
                                          Text: |
                                            ="効果金額: " &
                                            Text(
                                                If(
                                                    ddCategorySelect.Selected.CategoryType.Value = "金額算出",
                                                    If(
                                                        ddCategorySelect.Selected.CategoryCode = "CAT-06",
                                                        Value(numActualValue.Value) * Value(numWIPAmount.Value),
                                                        Value(numActualValue.Value) * ddCategorySelect.Selected.ConversionRate
                                                    ),
                                                    ddCategorySelect.Selected.CategoryType.Value = "直接入力",
                                                    Value(numActualValue.Value),
                                                    0
                                                ),
                                                "#,##0"
                                            ) & " 円/月"
                                          Visible: |
                                            =ddCategorySelect.Selected.CategoryType.Value <> "テキスト"
                                            && Value(numActualValue.Value) > 0
                                          Width: =Parent.Width
                              - galCategories:
                                  Control: Gallery@2.15.0
                                  Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
                                  Properties:
                                    FillPortions: =0
                                    Height: =CountRows(colCategories) * 44
                                    Items: =Sort(colCategories, SortOrder, SortOrder.Ascending)
                                    LayoutMinHeight: =16
                                    LayoutMinWidth: =16
                                    TemplateFill: =RGBA(0, 0, 0, 0)
                                    TemplatePadding: =0
                                    TemplateSize: =42
                                    Visible: =CountRows(colCategories) > 0
                                    Width: =Parent.Width
                                  Children:
                                    - cntCatRow:
                                        Control: GroupContainer@1.4.0
                                        Variant: AutoLayout
                                        Properties:
                                          Height: =Parent.TemplateHeight
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          LayoutGap: =8
                                          PaddingLeft: =8
                                          PaddingRight: =8
                                          Width: =Parent.TemplateWidth
                                        Children:
                                          - lblCatNum:
                                              Control: Text@0.0.51
                                              Properties:
                                                FillPortions: =0
                                                Height: =30
                                                Size: =12
                                                Text: =Text(ThisItem.SortOrder)
                                                Width: =24
                                          - lblCatName:
                                              Control: Text@0.0.51
                                              Properties:
                                                Height: =30
                                                Size: =12
                                                Text: =ThisItem.CategoryName
                                          - lblCatAmt:
                                              Control: Text@0.0.51
                                              Properties:
                                                FillPortions: =0
                                                Height: =30
                                                Size: =12
                                                Text: |
                                                  =If(
                                                      ThisItem.CategoryType = "テキスト",
                                                      ThisItem.Comment,
                                                      Text(ThisItem.EffectAmount, "#,##0") & " 円/月"
                                                  )
                                                Width: =180
                                          - icnCatDel:
                                              Control: Classic/Icon@2.5.0
                                              Properties:
                                                BorderColor: =RGBA(0, 0, 0, 1)
                                                Color: =RGBA(166, 166, 166, 1)
                                                Height: =28
                                                Icon: =Icon.Cancel
                                                OnSelect: |
                                                  =With(
                                                      {delOrder: ThisItem.SortOrder},
                                                      Remove(colCategories, ThisItem);
                                                      ForAll(
                                                          Filter(colCategories, SortOrder > delOrder),
                                                          Patch(colCategories, ThisRecord, {SortOrder: ThisRecord.SortOrder - 1})
                                                      )
                                                  )
                                                PaddingBottom: =6
                                                PaddingLeft: =6
                                                PaddingRight: =6
                                                PaddingTop: =6
                                                Width: =28
                              - lblTotalEffect:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =28
                                    Size: =14
                                    Text: |
                                      ="効果金額合計: " & Text(Sum(colCategories, EffectAmount), "#,##0") & " 円/月"
                                    Weight: ='TextCanvas.Weight'.Bold
                                    Width: =Parent.Width
                        - cntButtons:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =50
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =15
                              LayoutJustifyContent: =LayoutJustifyContent.End
                              PaddingTop: =10
                            Children:
                              - btnPreview:
                                  Control: Button@0.0.45
                                  Properties:
                                    Appearance: ='ButtonCanvas.Appearance'.Secondary
                                    Height: =40
                                    Text: ="プレビュー"
                                    Width: =140
                              - btnSubmit:
                                  Control: Button@0.0.45
                                  Properties:
                                    DisplayMode: |
                                      =If(
                                          IsBlank(gCurrentGID)
                                          || IsBlank(txtTheme.Value)
                                          || IsBlank(txtProblem.Value)
                                          || IsBlank(txtImprovement.Value)
                                          || IsBlank(dpCompletionDate.SelectedDate)
                                          || CountRows(colCategories) = 0,
                                          DisplayMode.Disabled,
                                          DisplayMode.Edit
                                      )
                                    Height: =40
                                    Text: ="提出"
                                    Width: =140
                  - cntRightColumn:
                      Control: GroupContainer@1.4.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.Semilight
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =0
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                        PaddingBottom: =20
                        PaddingLeft: =20
                        PaddingRight: =20
                        PaddingTop: =20
                        Width: =400
                      Children:
                        - lblMemberTitle:
                            Control: Text@0.0.51
                            Properties:
                              Height: =40
                              Size: =22
                              Text: ="改善メンバー"
                              Weight: ='TextCanvas.Weight'.Bold
                              Width: |
                                =400
                        - lblMemberCount:
                            Control: Text@0.0.51
                            Properties:
                              FontColor: =RGBA(100, 100, 100, 1)
                              Height: =24
                              Size: =12
                              Text: |
                                ="メンバー: " & CountRows(colMembers) & " / 10"
                              Width: |
                                =400
                        - lblMemberPreview:
                            Control: Text@0.0.51
                            Properties:
                              FontColor: |
                                =If(
                                    Len(txtMemberGID.Value) = 10
                                    && IsBlank(LookUp(社員マスタ, GID = txtMemberGID.Value)),
                                    RGBA(200, 0, 0, 1),
                                    RGBA(0, 100, 0, 1)
                                )
                              Height: =24
                              Size: =12
                              Text: |
                                =If(
                                    Len(txtMemberGID.Value) < 10,
                                    "",
                                    Len(txtMemberGID.Value) = 10,
                                    With(
                                        {emp: LookUp(社員マスタ, GID = txtMemberGID.Value)},
                                        If(
                                            IsBlank(emp),
                                            "該当する社員が見つかりません",
                                            "→ " & emp.EmployeeName
                                        )
                                    ),
                                    ""
                                )
                              Visible: =Len(txtMemberGID.Value) > 0
                              Width: |
                                =400
                        - cntMemberInput:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =44
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =8
                              Width: |
                                =400
                            Children:
                              - txtMemberGID:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Height: =36
                                    Placeholder: ="GID（10桁）を入力"
                                    Width: =160
                              - btnAddMember:
                                  Control: Button@0.0.45
                                  Properties:
                                    DisplayMode: |
                                      =If(
                                          CountRows(colMembers) >= 10
                                          || Len(txtMemberGID.Value) <> 10,
                                          DisplayMode.Disabled,
                                          DisplayMode.Edit
                                      )
                                    Height: =36
                                    OnSelect: |
                                      =Set(
                                          varMemberLookup,
                                          LookUp(社員マスタ, GID = txtMemberGID.Value)
                                      );
                                      If(
                                          IsBlank(varMemberLookup),
                                          Notify(
                                              "社員情報が見つかりません: " & txtMemberGID.Value,
                                              NotificationType.Error
                                          ),
                                          !IsBlank(LookUp(colMembers, MemberGID = txtMemberGID.Value)),
                                          Notify("既に追加されています", NotificationType.Warning),
                                          Collect(
                                              colMembers,
                                              {
                                                  MemberGID: varMemberLookup.GID,
                                                  MemberName: varMemberLookup.EmployeeName,
                                                  MemberOffice: varMemberLookup.Office,
                                                  MemberCostUnit: varMemberLookup.CostUnit,
                                                  SortOrder: CountRows(colMembers) + 1
                                              }
                                          );
                                          Reset(txtMemberGID);
                                          Notify(
                                              varMemberLookup.EmployeeName & " を追加しました",
                                              NotificationType.Success
                                          )
                                      )
                                    Text: ="追加"
                                    Width: =80
                        - galMembers:
                            Control: Gallery@2.15.0
                            Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
                            Properties:
                              BorderColor: =RGBA(200, 200, 200, 1)
                              FillPortions: =0
                              Height: =CountRows(colMembers) * 44
                              Items: =Sort(colMembers, SortOrder, SortOrder.Ascending)
                              LayoutMinHeight: =16
                              LayoutMinWidth: =16
                              TemplatePadding: =0
                              TemplateSize: =42
                              Width: =Parent.Width
                            Children:
                              - cntMemberRow:
                                  Control: GroupContainer@1.4.0
                                  Variant: AutoLayout
                                  Properties:
                                    Height: =Parent.TemplateHeight - 1
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =20
                                    PaddingLeft: =8
                                    PaddingRight: =8
                                    Width: =Parent.TemplateWidth
                                  Children:
                                    - lblRowNumber:
                                        Control: Text@0.0.51
                                        Properties:
                                          FillPortions: =0
                                          Height: =30
                                          Size: =12
                                          Text: =Text(ThisItem.SortOrder)
                                          Width: =24
                                    - lblRowGID:
                                        Control: Text@0.0.51
                                        Properties:
                                          FillPortions: =0
                                          Height: =30
                                          Size: =12
                                          Text: =ThisItem.MemberGID
                                          Width: =100
                                    - lblRowName:
                                        Control: Text@0.0.51
                                        Properties:
                                          Height: =30
                                          Size: =12
                                          Text: =ThisItem.MemberName
                                    - icnRemoveMember:
                                        Control: Classic/Icon@2.5.0
                                        Properties:
                                          BorderColor: =RGBA(0, 0, 0, 1)
                                          Color: =RGBA(166, 166, 166, 1)
                                          Height: =28
                                          Icon: =Icon.Cancel
                                          OnSelect: |
                                            =Remove(colMembers, ThisItem);
                                            ForAll(
                                                Filter(colMembers, SortOrder > ThisItem.SortOrder),
                                                Patch(
                                                    colMembers,
                                                    ThisRecord,
                                                    {SortOrder: ThisRecord.SortOrder - 1}
                                                )
                                            )
                                          PaddingBottom: =6
                                          PaddingLeft: =6
                                          PaddingRight: =6
                                          PaddingTop: =6
                                          Width: =28
                              - sepMember:
                                  Control: Rectangle@2.3.0
                                  Properties:
                                    BorderColor: =RGBA(200, 200, 200, 1)
                                    Fill: =RGBA(240, 240, 240, 1)
                                    Height: =1
                                    OnSelect: =Select(Parent)
                                    Width: =Parent.TemplateWidth
                                    Y: =Parent.TemplateHeight - Self.Height
                        - btnClearMembers:
                            Control: Button@0.0.45
                            Properties:
                              Appearance: ='ButtonCanvas.Appearance'.Secondary
                              DisplayMode: |
                                =If(
                                    CountRows(colMembers) = 0,
                                    DisplayMode.Disabled,
                                    DisplayMode.Edit
                                )
                              OnSelect: =Clear(colMembers)
                              Text: ="全てクリア"
                              Width: =120
