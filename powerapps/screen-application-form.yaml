                                    FillPortions: =1
                        - cntCategorySection:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: |
                                =100
                                + 130
                                + If(
                                    CountRows(colCategories) > 0,
                                    CountRows(colCategories) * 42 + 8,
                                    0
                                )
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =8
                              PaddingTop: =10
                            Children:
                              - Container1:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
