                                                FontColor: |
                                                  =Switch(
                                                      ThisItem.Category,
                                                      "改善前", RGBA(0, 100, 180, 1),
                                                      "改善後", RGBA(0, 150, 60, 1),
                                                      RGBA(100, 100, 100, 1)
                                                  )
                                                Height: =28
                                                Size: =11
                                                Text: =ThisItem.Category
                                                Weight: ='TextCanvas.Weight'.Semibold
                                                Width: =70
                                          - btnAttachDelete:
                                              Control: Button@0.0.45
                                              Properties:
                                                Appearance: ='ButtonCanvas.Appearance'.Secondary
                                                Height: =28
                                                OnSelect: |
                                                  =Remove(colAttachments, ThisItem);
                                                Text: ="削除"
                                                Width: =60
                              - lblAttachmentCount:
                                  Control: Text@0.0.51
                                  Properties:
                                    FontColor: =RGBA(100, 100, 100, 1)
                                    Height: =If(CountRows(colAttachments) > 0, 22, 0)
                                    Size: =11
                                    Text: |
                                      ="添付ファイル: " & CountRows(colAttachments) & "件"
                                    Visible: =CountRows(colAttachments) > 0
                                    Width: =200
                        - cntButtons:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Height: =50
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =15
                              LayoutJustifyContent: =LayoutJustifyContent.End
                              PaddingTop: =10
                            Children:
                              - btnPreview:
                                  Control: Button@0.0.45
                                  Properties:
                                    Appearance: ='ButtonCanvas.Appearance'.Secondary
                                    Height: =40
                                    OnSelect: |
                                      =// --- プレビュー用データ準備 ---
                                      Set(varFromPreview, true);
                                      Set(varViewMode, "Preview");
                                      Set(varViewRequestID, "（プレビュー）");
                                      Set(varViewApplicantGID, gCurrentGID);
                                      Set(varViewApplicantName, gCurrentName);
                                      Set(varViewAwardCategory, ddAwardCategory.Selected.AwardName);
                                      Set(varViewDept, gCurrentDept);
                                      Set(varViewDivision, gCurrentDivision);
                                      Set(varViewBu, gCurrentBu);
                                      Set(varViewSection, gCurrentSection);
                                      Set(varViewUnit, txtUnit.Value);
                                      Set(varViewTheme, txtTheme.Value);
                                      Set(varViewProblem, txtProblem.Value);
                                      Set(varViewImprovement, txtImprovement.Value);
                                      Set(varViewCompletionDate, dpCompletionDate.SelectedDate);
                                      Set(varViewTotalEffect, Sum(colCategories, EffectAmount));
                                      Set(varViewStatus, "下書き");
                                      Set(varViewManagerName, If(varEval1IsNone, "", varEval1Name));
                                      Set(varViewDirectorName, varEval2Name);
                                      ClearCollect(colViewCategories, colCategories);
                                      ClearCollect(colViewMembers, colMembers);
                                      ClearCollect(
                                          colViewAttachments,
                                          ForAll(
                                              colAttachments As att,
                                              {
                                                  FileName: att.Name,
                                                  FileLink: If(
                                                      !IsBlank(varEditRequestID) && IsBlank(att.ContentBase64),
                                                      gSharePointSiteUrl & "/" & LookUp(
                                                          Filter(添付ファイル, RequestID = varEditRequestID),
                                                          拡張子付きのファイル名 = varEditRequestID & "_" & att.Name
                                                      ).'完全パス ',
                                                      ""
                                                  ),
                                                  ContentBase64: att.ContentBase64,
                                                  FileCategory: att.Category
                                              }
                                          )
                                      );
                                      Navigate(ViewScreen)
                                    Text: ="プレビュー"
                                    Width: =140
                              - btnDraftSave:
                                  Control: Button@0.0.45
                                  Properties:
                                    Appearance: ='ButtonCanvas.Appearance'.Secondary
                                    Height: =40
                                    OnSelect: |
                                      =// ============================================================
                                      // 下書き保存ボタン (btnDraftSave.OnSelect) - §5
                                      // 表彰区分のみ必須バリデーション、Status="下書き"で保存、画面遷移なし
                                      // ============================================================

                                      // --- Step 0: バリデーション（表彰区分のみ必須） ---
                                      If(
                                          IsBlank(ddAwardCategory.Selected),
                                          Notify("表彰区分を選択してください。", NotificationType.Error),

                                          // --- Step 1: User型列用のメールアドレスを準備 ---
                                          Set(
                                              varApplicantEmail,
                                              If(gTestMode, gCurrentEmail, User().Email)
                                          );

                                          // --- Step 2: メイン提案をPatch（Status=下書き） ---
                                          Set(
                                              varNewRequest,
                                              Patch(
                                                  改善提案メイン,
                                                  If(
                                                      !IsBlank(varEditRequestID),
                                                      LookUp(改善提案メイン, RequestID = varEditRequestID),
                                                      Defaults(改善提案メイン)
                                                  ),
                                                  {
                                                      ApplicantEmail: {
                                                          '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                                                          Claims: "i:0#.f|membership|" & varApplicantEmail,
                                                          Department: "",
                                                          DisplayName: "",
                                                          Email: varApplicantEmail,
                                                          JobTitle: "",
                                                          Picture: ""
                                                      },
                                                      ApplicantGID: gCurrentGID,
                                                      ApplicantName: gCurrentName,
                                                      ApplicantOffice: gCurrentEmployee.Office,
                                                      ApplicantCostUnit: gCurrentEmployee.CostUnit,
                                                      AwardCategory: {Value: ddAwardCategory.Selected.AwardName},
                                                      Department: gCurrentDept,
                                                      Division: gCurrentDivision,
                                                      Bu: gCurrentBu,
                                                      Section: gCurrentSection,
                                                      Unit: If(IsBlank(txtUnit.Value), "", txtUnit.Value),
                                                      Theme: If(IsBlank(txtTheme.Value), "", txtTheme.Value),
                                                      Problem: If(IsBlank(txtProblem.Value), "", txtProblem.Value),
                                                      Improvement: If(IsBlank(txtImprovement.Value), "", txtImprovement.Value),
                                                      CompletionDate: If(
                                                          IsBlank(dpCompletionDate.SelectedDate),
                                                          Today(),
                                                          dpCompletionDate.SelectedDate
                                                      ),
                                                      TotalEffectAmount: Sum(colCategories, EffectAmount),
                                                      Status: {Value: "下書き"},
                                                      ApproverManager: If(
                                                          varEval1IsNone,
                                                          Blank(),
                                                          {
                                                              '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                                                              Claims: "i:0#.f|membership|" & varEval1Email,
                                                              Department: "",
                                                              DisplayName: varEval1Name,
                                                              Email: varEval1Email,
                                                              JobTitle: "",
                                                              Picture: ""
                                                          }
                                                      )
                                                  }
                                              )
                                          );

                                          // --- Step 2.1: ApproverDirector（空メールガード: M-1対応） ---
                                          If(
                                              !IsBlank(varEval2Email),
                                              Patch(
                                                  改善提案メイン,
                                                  varNewRequest,
                                                  {
                                                      ApproverDirector: {
                                                          '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                                                          Claims: "i:0#.f|membership|" & varEval2Email,
                                                          Department: "",
                                                          DisplayName: varEval2Name,
                                                          Email: varEval2Email,
                                                          JobTitle: "",
                                                          Picture: ""
                                                      }
                                                  }
                                              )
                                          );

                                          // --- Step 2.5: RequestID設定（KZ形式、初回のみ: DJ-9） ---
                                          If(
                                              IsBlank(varEditRequestID),
                                              Set(varEditRequestID, "KZ-" & Text(Year(Now())) & "-" & Text(varNewRequest.ID, "00000"));
                                              Patch(改善提案メイン, varNewRequest, {RequestID: varEditRequestID})
                                          );

                                          // --- Step 3: 編集モード時は旧子レコードを削除 ---
                                          If(
                                              !IsBlank(varEditRequestID),
                                              ClearCollect(_tempOldMembers, Filter(改善メンバー, RequestID = varEditRequestID));
                                              ForAll(
                                                  _tempOldMembers As oldRec,
                                                  Remove(改善メンバー, oldRec)
                                              );
                                              ClearCollect(_tempOldCategories, Filter(改善分野実績, RequestID = varEditRequestID));
                                              ForAll(
                                                  _tempOldCategories As oldRec,
                                                  Remove(改善分野実績, oldRec)
                                              )
                                          );

                                          // --- Step 4: 改善メンバーリストへ登録 ---
                                          ForAll(
                                              colMembers,
                                              Patch(
                                                  改善メンバー,
                                                  Defaults(改善メンバー),
                                                  {
                                                      RequestID: varEditRequestID,
                                                      MemberGID: ThisRecord.MemberGID,
                                                      MemberName: ThisRecord.MemberName,
                                                      MemberOffice: ThisRecord.MemberOffice,
                                                      MemberCostUnit: ThisRecord.MemberCostUnit,
                                                      SortOrder: ThisRecord.SortOrder
                                                  }
                                              )
                                          );

                                          // --- Step 5: 改善分野実績リストへ登録 ---
                                          ForAll(
                                              colCategories,
                                              Patch(
                                                  改善分野実績,
                                                  Defaults(改善分野実績),
                                                  {
                                                      RequestID: varEditRequestID,
                                                      CategoryCode: ThisRecord.CategoryCode,
                                                      CategoryName: ThisRecord.CategoryName,
                                                      ActualValue: ThisRecord.ActualValue,
                                                      WIPAmount: ThisRecord.WIPAmount,
                                                      ConversionRate: ThisRecord.ConversionRate,
                                                      Comment: ThisRecord.Comment,
                                                      Formula: ThisRecord.CategoryType,
                                                      EffectAmount: ThisRecord.EffectAmount,
                                                      SortOrder: ThisRecord.SortOrder
                                                  }
                                              )
                                          );

                                          // --- Step 6: 添付ファイル転送（§1 ステージング方式） ---
                                          改善WF_ステージング転送.Run(
                                              varEditRequestID,
                                              Text(varStagingBeforeID),
                                              Text(varStagingAfterID),
                                              Text(varStagingOtherID)
                                          );
                                          // ステージングIDをリセットし、新しいレコードを即座に作成（編集継続のため）
                                          Set(varStagingBeforeID, Blank());
                                          Set(varStagingAfterID, Blank());
                                          Set(varStagingOtherID, Blank());
                                          Clear(colStagingDisplay);
                                          Set(varStagingBeforeID,
                                              Patch(添付ファイルステージング, Defaults(添付ファイルステージング),
                                                    {Title: "staging_" & Text(Now(), "yyyymmddHHmmss"), FileCategory: "改善前"}).ID);
                                          Set(varStagingAfterID,
                                              Patch(添付ファイルステージング, Defaults(添付ファイルステージング),
                                                    {Title: "staging_" & Text(Now(), "yyyymmddHHmmss"), FileCategory: "改善後"}).ID);
                                          Set(varStagingOtherID,
                                              Patch(添付ファイルステージング, Defaults(添付ファイルステージング),
                                                    {Title: "staging_" & Text(Now(), "yyyymmddHHmmss"), FileCategory: "その他"}).ID);
                                          Set(varCurrentStagingItem, LookUp(添付ファイルステージング, ID = varStagingBeforeID));

                                          // --- Step 7: 完了通知（画面遷移なし、編集継続） ---
                                          Notify("下書きを保存しました。", NotificationType.Success)
                                      )
                                    Text: ="下書き保存"
                                    Width: =140
                              - btnSubmit:
                                  Control: Button@0.0.45
                                  Properties:
                                    DisplayMode: |
                                      =If(
                                          IsBlank(gCurrentGID)
                                          || IsBlank(txtTheme.Value)
                                          || IsBlank(txtProblem.Value)
                                          || IsBlank(txtImprovement.Value)
                                          || IsBlank(dpCompletionDate.SelectedDate)
                                          || CountRows(colCategories) = 0,
                                          DisplayMode.Disabled,
                                          DisplayMode.Edit
                                      )
                                    Height: =40
                                    OnSelect: |
                                      =// ============================================================
                                      // 提出ボタン (btnSubmit.OnSelect) - 提出処理ロジック
                                      // タスク: 2-2, 2-3, 2-6（確認ポップアップ）
                                      // 差戻再提出対応: varEditRequestIDが設定済みの場合は既存レコードを更新
                                      // ============================================================

                                      // --- §2: 評価者バリデーション（確認ポップアップ前） ---
                                      Set(varEvalValidError, "");
                                      If(IsBlank(varEval2GID),
                                          Set(varEvalValidError, "2人目の評価者は必須です。GIDを入力してください。")
                                      );
                                      If(
                                          IsBlank(varEvalValidError)
                                          && ((!varEval1IsNone && varEval1GID = gCurrentGID) || varEval2GID = gCurrentGID),
                                          Set(varEvalValidError, "自分自身を評価者に設定することはできません。")
                                      );
                                      If(
                                          IsBlank(varEvalValidError) && !varEval1IsNone && varEval1GID = varEval2GID,
                                          Set(varEvalValidError, "1人目と2人目に同じ評価者を設定することはできません。")
                                      );
                                      If(
                                          !IsBlank(varEvalValidError),
                                          Notify(varEvalValidError, NotificationType.Error),
                                      // --- 確認ポップアップ制御（タスク: 2-6） ---
                                      If(
                                          !varConfirmed,
                                          // ポップアップ表示して処理中断
                                          Set(varConfirmAction, "submit");
                                          Set(varShowConfirmPopup, true),
                                          // --- 確認済み: フラグリセット後に実処理を実行 ---
                                          Set(varConfirmed, false);

                                          // --- Step 0: User型列用のメールアドレスを準備 ---
                                          Set(
                                              varApplicantEmail,
                                              If(gTestMode, gCurrentEmail, User().Email)
                                          );

                                          // --- Step 1: メイン提案をPatch ---
                                          // 編集モード: 既存レコードを更新 / 新規: 新しいレコードを作成
                                          Set(
                                              varNewRequest,
                                              Patch(
                                                  改善提案メイン,
                                                  If(
                                                      !IsBlank(varEditRequestID),
                                                      LookUp(改善提案メイン, RequestID = varEditRequestID),
                                                      Defaults(改善提案メイン)
                                                  ),
                                                  {
                                                      ApplicantEmail: {
                                                          '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                                                          Claims: "i:0#.f|membership|" & varApplicantEmail,
                                                          Department: "",
                                                          DisplayName: "",
                                                          Email: varApplicantEmail,
                                                          JobTitle: "",
                                                          Picture: ""
                                                      },
                                                      ApplicantGID: gCurrentGID,
                                                      ApplicantName: gCurrentName,
                                                      ApplicantOffice: gCurrentEmployee.Office,
                                                      ApplicantCostUnit: gCurrentEmployee.CostUnit,
                                                      AwardCategory: {Value: ddAwardCategory.Selected.AwardName},
                                                      Department: gCurrentDept,
                                                      Division: gCurrentDivision,
                                                      Bu: gCurrentBu,
                                                      Section: gCurrentSection,
                                                      Unit: txtUnit.Value,
                                                      Theme: txtTheme.Value,
                                                      Problem: txtProblem.Value,
                                                      Improvement: txtImprovement.Value,
                                                      CompletionDate: dpCompletionDate.SelectedDate,
                                                      TotalEffectAmount: Sum(colCategories, EffectAmount),
                                                      Status: {Value: If(CountRows(colReviewers) > 0, "回覧中", "申請中")},
                                                      // [§7] 現在の担当者: 回覧者あり→1人目の回覧者, 回覧者なし→1人目の評価者（§2: なしなら2人目）
                                                      CurrentAssigneeEmail: With(
                                                          {
                                                              _email: If(
                                                                  CountRows(colReviewers) > 0,
                                                                  LookUp(colReviewers, ReviewOrder = 1).ReviewerEmail,
                                                                  If(!varEval1IsNone, varEval1Email, varEval2Email)
                                                              )
                                                          },
                                                          If(
                                                              IsBlank(_email),
                                                              Blank(),
                                                              {
                                                                  '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                                                                  Claims: "i:0#.f|membership|" & _email,
                                                                  Department: "",
                                                                  DisplayName: "",
                                                                  Email: _email,
                                                                  JobTitle: "",
                                                                  Picture: ""
                                                              }
                                                          )
                                                      ),
                                                      EvaluationStartDate: Now(),
                                                      ApproverManager: If(
                                                          varEval1IsNone,
                                                          Blank(),
                                                          {
                                                              '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                                                              Claims: "i:0#.f|membership|" & varEval1Email,
                                                              Department: "",
                                                              DisplayName: varEval1Name,
                                                              Email: varEval1Email,
                                                              JobTitle: "",
                                                              Picture: ""
                                                          }
                                                      )
                                                  }
                                              )
                                          );

                                          // --- Step 1.1: ApproverDirector（空メールガード: M-1対応） ---
                                          If(
                                              !IsBlank(varEval2Email),
                                              Patch(
                                                  改善提案メイン,
                                                  varNewRequest,
                                                  {
                                                      ApproverDirector: {
                                                          '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                                                          Claims: "i:0#.f|membership|" & varEval2Email,
                                                          Department: "",
                                                          DisplayName: varEval2Name,
                                                          Email: varEval2Email,
                                                          JobTitle: "",
                                                          Picture: ""
                                                      }
                                                  }
                                              )
                                          );

                                          // --- Step 1.5: RequestID設定（KZ形式、初回のみ: DJ-9） ---
                                          If(
                                              IsBlank(varEditRequestID),
                                              Set(varEditRequestID, "KZ-" & Text(Year(Now())) & "-" & Text(varNewRequest.ID, "00000"));
                                              Patch(改善提案メイン, varNewRequest, {RequestID: varEditRequestID})
                                          );

                                          // --- Step 1.6: 編集モード時は旧子レコードを削除 ---
                                          // ForAllで同じデータソースをRead+Removeできないため、ローカルコレクションに退避してから削除
                                          If(
                                              !IsBlank(varEditRequestID),
                                              ClearCollect(_tempOldMembers, Filter(改善メンバー, RequestID = varEditRequestID));
                                              ForAll(
                                                  _tempOldMembers As oldRec,
                                                  Remove(改善メンバー, oldRec)
                                              );
                                              ClearCollect(_tempOldCategories, Filter(改善分野実績, RequestID = varEditRequestID));
                                              ForAll(
                                                  _tempOldCategories As oldRec,
                                                  Remove(改善分野実績, oldRec)
                                              )
                                          );

                                          // --- Step 1.7: 回覧メンバーリスト処理（§3） ---
                                          If(
                                              !IsBlank(varEditRequestID),
                                              ClearCollect(_tempOldReviewers, Filter(回覧メンバー, RequestID = varEditRequestID));
                                              ForAll(
                                                  _tempOldReviewers As oldRec,
                                                  Remove(回覧メンバー, oldRec)
                                              )
                                          );
                                          If(
                                              CountRows(colReviewers) > 0,
                                              ForAll(
                                                  colReviewers As rev,
                                                  Patch(
                                                      回覧メンバー,
                                                      Defaults(回覧メンバー),
                                                      {
                                                          RequestID: If(!IsBlank(varEditRequestID), varEditRequestID, Text(varNewRequest.ID)),
                                                          ReviewerGID: rev.ReviewerGID,
                                                          ReviewerName: rev.ReviewerName,
                                                          ReviewerEmail: rev.ReviewerEmail,
                                                          ReviewOrder: rev.ReviewOrder,
                                                          ReviewStatus: {Value: "未回覧"}
                                                      }
                                                  )
                                              )
                                          );

                                          // --- Step 2: 改善メンバーリストへ登録 ---
                                          ForAll(
                                              colMembers,
                                              Patch(
                                                  改善メンバー,
                                                  Defaults(改善メンバー),
                                                  {
                                                      RequestID: varEditRequestID,
                                                      MemberGID: ThisRecord.MemberGID,
                                                      MemberName: ThisRecord.MemberName,
                                                      MemberOffice: ThisRecord.MemberOffice,
                                                      MemberCostUnit: ThisRecord.MemberCostUnit,
                                                      SortOrder: ThisRecord.SortOrder
                                                  }
                                              )
                                          );

                                          // --- Step 3: 改善分野実績リストへ登録（全タイプ統合: 金額算出・直接入力・テキスト） ---
                                          ForAll(
                                              colCategories,
                                              Patch(
                                                  改善分野実績,
                                                  Defaults(改善分野実績),
                                                  {
                                                      RequestID: varEditRequestID,
                                                      CategoryCode: ThisRecord.CategoryCode,
                                                      CategoryName: ThisRecord.CategoryName,
                                                      ActualValue: ThisRecord.ActualValue,
                                                      WIPAmount: ThisRecord.WIPAmount,
                                                      ConversionRate: ThisRecord.ConversionRate,
                                                      Comment: ThisRecord.Comment,
                                                      Formula: ThisRecord.CategoryType,
                                                      EffectAmount: ThisRecord.EffectAmount,
                                                      SortOrder: ThisRecord.SortOrder
                                                  }
                                              )
                                          );

                                          // --- Step 3.5: 添付ファイル転送（§1 ステージング方式） ---
                                          改善WF_ステージング転送.Run(
                                              varEditRequestID,
                                              Text(varStagingBeforeID),
                                              Text(varStagingAfterID),
                                              Text(varStagingOtherID)
                                          );
                                          Set(varStagingBeforeID, Blank());
                                          Set(varStagingAfterID, Blank());
                                          Set(varStagingOtherID, Blank());
                                          Clear(colStagingDisplay);

                                          // --- Step 3.7: 申請通知フロー直接起動（DJ-10: 案B） ---
                                          // §3回覧者あり統合時: If(CountRows(colReviewers) > 0, 回覧通知フロー.Run(varEditRequestID), 改善WF_申請通知.Run(varEditRequestID))
                                          改善WF_申請通知.Run(varEditRequestID);

                                          // --- Step 4: クリーンアップ ---
                                          Clear(colCategories);
                                          Clear(colMembers);
                                          Clear(colAttachments);
                                          Clear(colReviewers);
                                          // 次回新規申請時にOnVisibleで評価者デフォルトが再設定されるようリセット
                                          Set(varEval2GID, "");
                                          // 完了ポップアップ表示（確認後にViewScreenへ遷移）
                                          Set(varSubmittedRequestID, varEditRequestID);
                                          Set(varEditRequestID, "");
                                          Set(varConfirmAction, "submitted");
                                          Set(varShowConfirmPopup, true)
                                      )
                                      )
                                    Text: ="提出"
                                    Width: =140
                        - Container4:
                            Control: GroupContainer@1.5.0
                            Variant: ManualLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              LayoutMinHeight: =20
                              LayoutMinWidth: =16
                              X: =40
                              Y: =40
                  - cntRightColumn:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.Semilight
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =0
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                        PaddingBottom: =20
                        PaddingLeft: =20
                        PaddingRight: =20
                        PaddingTop: =20
