                              Weight: ='TextCanvas.Weight'.Bold
                              Width: =Parent.Width
                        - cntApplicantEmail:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
