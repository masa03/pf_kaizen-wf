                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              FillPortions: =0
                              Height: =44 + CountRows(colMembers) * 44
                              LayoutDirection: =LayoutDirection.Vertical
                              Width: =360
                            Children:
                              - cntMemberHeader:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    FillPortions: =0
                                    Height: =44
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =8
                                    Width: =360
                                  Children:
                                    - lblMemberTitle:
                                        Control: Text@0.0.51
                                        Properties:
                                          FillPortions: =1
