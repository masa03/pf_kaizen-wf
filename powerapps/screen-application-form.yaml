                                          CountRows(colMembers) >= 10
                                          || Len(txtMemberGID.Value) <> 10,
                                          DisplayMode.Disabled,
                                          DisplayMode.Edit
                                      )
                                    Height: =36
                                    OnSelect: |
                                      =Set(
                                          varMemberLookup,
                                          LookUp(社員マスタ, GID = txtMemberGID.Value)
                                      );
                                      If(
                                          IsBlank(varMemberLookup),
                                          Notify(
                                              "社員情報が見つかりません: " & txtMemberGID.Value,
                                              NotificationType.Error
                                          ),
                                          !IsBlank(LookUp(colMembers, MemberGID = txtMemberGID.Value)),
                                          Notify("既に追加されています", NotificationType.Warning),
                                          Collect(
                                              colMembers,
                                              {
                                                  MemberGID: varMemberLookup.GID,
                                                  MemberName: varMemberLookup.EmployeeName,
                                                  MemberOffice: varMemberLookup.Office,
                                                  MemberCostUnit: varMemberLookup.CostUnit,
                                                  SortOrder: CountRows(colMembers) + 1
                                              }
                                          );
                                          Reset(txtMemberGID);
                                          Notify(
                                              varMemberLookup.EmployeeName & " を追加しました",
                                              NotificationType.Success
                                          )
                                      )
                                    Text: ="追加"
                                    Width: =80
                        - galMembers:
