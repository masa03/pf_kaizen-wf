                        Fill: =RGBA(220, 220, 220, 1)
                        Height: =1
                        Visible: =!varEvalIsReviewer && IsBlank(varEvalStatusMessage)
                        Width: =Parent.Width
                  - cntEvalComment:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =4
                        PaddingBottom: =8
                        PaddingLeft: =8
                        PaddingRight: =8
                        PaddingTop: =8
                        Visible: =!varEvalIsReviewer && IsBlank(varEvalStatusMessage)
                      Children:
                        - lblEvalCommentLabel:
                            Control: Text@0.0.51
                            Properties:
                              Height: =30
                              Size: =13
                              Text: ="コメント"
                              Weight: ='TextCanvas.Weight'.Bold
                              Width: =120
                        - txtEvalComment:
                            Control: TextInput@0.0.54
                            Properties:
                              Height: =100
                              Mode: ='TextInputCanvas.Mode'.Multiline
                              Value: |
                                =If(
                                    !IsBlank(varEvalPreviousData),
                                    varEvalPreviousData.EvalComment,
                                    ""
                                )
                              Width: =Parent.Width - 40
                  - cntEvalRecommend:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: =44
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =15
                        PaddingBottom: =8
                        PaddingLeft: =8
                        PaddingRight: =8
                        PaddingTop: =8
                        Visible: =!varEvalIsReviewer && IsBlank(varEvalStatusMessage)
                      Children:
                        - lblEvalRecommendLabel:
                            Control: Text@0.0.51
                            Properties:
                              Height: =30
                              Size: =13
                              Text: ="おすすめ情報"
                              Weight: ='TextCanvas.Weight'.Bold
                              Width: =120
                        - tglEvalRecommend:
                            Control: Toggle@1.1.5
                            Properties:
                              Checked: |
                                =If(
                                    !IsBlank(varEvalPreviousData),
                                    varEvalPreviousData.IsRecommended,
                                    false
                                )
                              Height: =30
                              Label: =""
                              Width: =60
                  - cntReviewerDismissSection:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =100
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =6
                        PaddingLeft: =20
                        PaddingRight: =20
                        PaddingTop: =10
                        Visible: =varEvalIsReviewer && IsBlank(varEvalStatusMessage)
                        Width: =Parent.Width
                      Children:
                        - lblReviewerDismissTitle:
                            Control: Text@0.0.51
                            Properties:
                              FontColor: =RGBA(100, 100, 100, 1)
                              Height: =24
                              Size: =13
                              Text: ="差戻理由（差戻時は必須）"
                              Width: =Parent.Width
                        - txtReviewerDismissComment:
                            Control: TextInput@0.0.54
                            Properties:
                              Height: =60
                              Mode: =TextMode.MultiLine
                              Placeholder: ="差戻理由を入力してください"
                              Width: =Parent.Width
                  - sepEvalButtons:
                      Control: Rectangle@2.3.0
                      Properties:
                        Fill: =RGBA(220, 220, 220, 1)
                        Height: =1
                        Visible: =IsBlank(varEvalStatusMessage)
                        Width: =Parent.Width
                  - cntEvalButtons:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: =70
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =15
                        LayoutJustifyContent: =LayoutJustifyContent.End
                        PaddingBottom: =8
                        PaddingLeft: =8
                        PaddingRight: =20
                        PaddingTop: =10
                        Visible: =IsBlank(varEvalStatusMessage)
                        Width: =Parent.Width
                      Children:
                        - btnEvalReject:
                            Control: Button@0.0.45
                            Properties:
                              Appearance: ='ButtonCanvas.Appearance'.Secondary
                              Height: =40
                              OnSelect: |
                                =// ============================================================
                                // 差戻処理（タスク: 2-5, 2-6 確認ポップアップ, §3 Reviewerモード）
                                // ============================================================
                                If(
                                    varEvalIsReviewer,
                                    // --- [§3] 回覧メンバー差戻処理 ---
                                    If(
                                        IsBlank(txtReviewerDismissComment.Value),
                                        Notify("差戻理由を入力してください", NotificationType.Error),
                                        If(
                                            !varConfirmed,
                                            Set(varConfirmAction, "reject");
                                            Set(varShowConfirmPopup, true),
                                            Set(varConfirmed, false);
                                            // 回覧メンバーリストのStatusを「差戻」に更新
                                            Patch(
                                                回覧メンバー,
                                                LookUp(回覧メンバー, RequestID = varEvalRequestID && ReviewerGID = gCurrentGID),
                                                {ReviewStatus: {Value: "差戻"}, ReviewDateTime: Now()}
                                            );
                                            // メインリストのステータスを「差戻」に更新 + CurrentAssigneeEmail クリア [§7]
                                            Patch(
                                                改善提案メイン,
                                                LookUp(改善提案メイン, RequestID = varEvalRequestID),
                                                {
                                                    Status: {Value: "差戻"},
                                                    CurrentAssigneeEmail: Blank()
                                                }
                                            );
                                            // 差戻フロー呼び出し（インスタントフロー: 方式A）
                                            改善WF_回覧差戻.Run(varEvalRequestID, gCurrentGID, txtReviewerDismissComment.Value);
                                            // 完了ポップアップ表示
                                            Set(varConfirmAction, "reviewer_dismissed");
                                            Set(varShowConfirmPopup, true)
                                        )
                                    ),
                                    // --- 通常の評価者差戻処理 ---
                                    If(
                                    !varConfirmed,
                                    // ポップアップ表示して処理中断
                                    Set(varConfirmAction, "reject");
                                    Set(varShowConfirmPopup, true),
                                    // --- 確認済み: 実処理 ---
                                    Set(varConfirmed, false);
                                    Set(
                                        varEvaluatorEmail,
                                        User().Email
                                    );
                                    // --- 評価データリストにPatch（判定=差戻） ---
                                    // 既存レコードがあれば更新、なければ新規作成（差戻→再提出→再評価で重複防止）
                                    Patch(
                                        評価データ,
                                        If(
                                            !IsBlank(LookUp(評価データ, RequestID = varEvalRequestID && EvaluatorType.Value = varEvalEvaluatorType)),
                                            LookUp(評価データ, RequestID = varEvalRequestID && EvaluatorType.Value = varEvalEvaluatorType),
                                            Defaults(評価データ)
                                        ),
                                        {
                                            RequestID: varEvalRequestID,
                                            EvaluatorType: {Value: varEvalEvaluatorType},
                                            EvaluatorEmail: {
                                                '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                                                Claims: "i:0#.f|membership|" & varEvaluatorEmail,
                                                Department: "",
                                                DisplayName: "",
                                                Email: varEvaluatorEmail,
                                                JobTitle: "",
                                                Picture: ""
                                            },
                                            AwardCategory: {Value: varViewAwardCategory},
                                            EvalComment: txtEvalComment.Value,
                                            Decision: {Value: "差戻"},
                                            EvalDateTime: Now(),
                                            IsRecommended: false
                                        }
                                    );
                                    // --- メインリストのステータスを差戻に更新 ---
                                    With(
                                        {mainRec: LookUp(改善提案メイン, RequestID = varEvalRequestID)},
                                        Patch(改善提案メイン, mainRec, {Status: {Value: "差戻"}})
                                    );
                                    // 完了ポップアップ表示（確認後にアプリ終了）
                                    Set(varConfirmAction, "rejected");
                                    Set(varShowConfirmPopup, true)
                                )    // If(!varConfirmed) 閉じ
                                )    // If(varEvalIsReviewer) 閉じ
                              Text: ="差戻"
                              Width: =120
                        - btnEvalApprove:
                            Control: Button@0.0.45
                            Properties:
                              Appearance: ='ButtonCanvas.Appearance'.Primary
                              DisplayMode: |
                                =If(
                                    !varEvalIsReviewer
                                    && varEvalRequiresScoring
                                    && (
                                        varEvalEffectScore = 0
                                        || IsBlank(radEvalCreativity.Selected.Score)
                                        || IsBlank(radEvalEffort.Selected.Score)
                                        || IsBlank(radEvalScope.Selected.Score)
                                    ),
                                    DisplayMode.Disabled,
                                    DisplayMode.Edit
                                )
                              Height: =40
                              OnSelect: |
                                =// ============================================================
                                // 承認処理（タスク: 2-5, 2-6 確認ポップアップ, §3 Reviewerモード）
                                // ============================================================
                                If(
                                    varEvalIsReviewer,
                                    // --- [§3] 回覧メンバー承認処理 ---
                                    If(
                                        !varConfirmed,
                                        Set(varConfirmAction, "approve");
                                        Set(varShowConfirmPopup, true),
                                        Set(varConfirmed, false);
                                        Patch(
                                            回覧メンバー,
                                            LookUp(回覧メンバー, RequestID = varEvalRequestID && ReviewerGID = gCurrentGID),
                                            {ReviewStatus: {Value: "承認"}, ReviewDateTime: Now()}
                                        );
                                        // 完了ポップアップ表示
                                        Set(varConfirmAction, "reviewer_approved");
                                        Set(varShowConfirmPopup, true)
                                    ),
                                    // --- 通常の評価者承認処理 ---
                                    If(
                                    !varConfirmed,
                                    // ポップアップ表示して処理中断
                                    Set(varConfirmAction, "approve");
                                    Set(varShowConfirmPopup, true),
                                    // --- 確認済み: 実処理 ---
                                    Set(varConfirmed, false);
                                    // --- Step 0: 評価者メールアドレス準備 ---
                                    Set(
                                        varEvaluatorEmail,
                                        User().Email
                                    );
                                    // --- Step 1: スコアリング値を計算 ---
                                    Set(
                                        varCalcRawTotal,
                                        If(
                                            varEvalRequiresScoring,
                                            varEvalEffectScore
                                            + Value(radEvalCreativity.Selected.Score)
                                            + Value(radEvalEffort.Selected.Score)
                                            + Value(radEvalScope.Selected.Score),
                                            0
                                        )
                                    );
                                    Set(
                                        varCalcAdjusted,
                                        If(
                                            varEvalRequiresScoring,
                                            RoundDown(
                                                varCalcRawTotal * If(varEvalIsManagement, 0.85, 1),
                                                0
                                            ),
                                            0
                                        )
                                    );
                                    Set(
                                        varCalcGrade,
                                        If(
                                            !varEvalRequiresScoring,
                                            "",
                                            If(
                                                varCalcAdjusted >= 70, "1等",
                                                varCalcAdjusted >= 60, "2等",
                                                varCalcAdjusted >= 50, "3等",
                                                varCalcAdjusted >= 40, "4等",
                                                varCalcAdjusted >= 30, "5等",
                                                "6等"
                                            )
                                        )
                                    );
                                    Set(
                                        varCalcReward,
                                        If(
                                            !varEvalRequiresScoring,
                                            varEvalAwardReward,
                                            If(
                                                varCalcAdjusted >= 70, 10000,
                                                varCalcAdjusted >= 60, 5000,
                                                varCalcAdjusted >= 50, 3000,
                                                varCalcAdjusted >= 40, 1000,
                                                varCalcAdjusted >= 30, 600,
                                                300
                                            )
                                        )
                                    );
                                    // --- Step 2: 評価データリストにPatch ---
                                    // 既存レコードがあれば更新、なければ新規作成（差戻→再提出→再評価で重複防止）
                                    Patch(
                                        評価データ,
                                        If(
                                            !IsBlank(LookUp(評価データ, RequestID = varEvalRequestID && EvaluatorType.Value = varEvalEvaluatorType)),
                                            LookUp(評価データ, RequestID = varEvalRequestID && EvaluatorType.Value = varEvalEvaluatorType),
                                            Defaults(評価データ)
                                        ),
                                        {
                                            RequestID: varEvalRequestID,
                                            EvaluatorType: {Value: varEvalEvaluatorType},
                                            EvaluatorEmail: {
                                                '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                                                Claims: "i:0#.f|membership|" & varEvaluatorEmail,
                                                Department: "",
                                                DisplayName: "",
                                                Email: varEvaluatorEmail,
                                                JobTitle: "",
                                                Picture: ""
                                            },
                                            AwardCategory: {Value: varViewAwardCategory},
                                            EffectCalcFlag: If(varEvalRequiresScoring, varEvalEffectCalcFlag, false),
                                            EffectScore: If(varEvalRequiresScoring, varEvalEffectScore, 0),
                                            CreativityScore: If(varEvalRequiresScoring, Value(radEvalCreativity.Selected.Score), 0),
                                            EffortScore: If(varEvalRequiresScoring, Value(radEvalEffort.Selected.Score), 0),
                                            ScopeScore: If(varEvalRequiresScoring, Value(radEvalScope.Selected.Score), 0),
                                            RawTotal: varCalcRawTotal,
                                            AdjustedScore: varCalcAdjusted,
                                            Grade: varCalcGrade,
                                            RewardAmount: varCalcReward,
                                            EvalComment: txtEvalComment.Value,
                                            Decision: {Value: "承認"},
                                            EvalDateTime: Now(),
                                            IsRecommended: tglEvalRecommend.Checked
                                        }
                                    );
                                    // --- Step 3: メインリストのステータス更新 ---
                                    With(
                                        {mainRec: LookUp(改善提案メイン, RequestID = varEvalRequestID)},
                                        If(
                                            varEvalEvaluatorType = "課長",
                                            If(
                                                varCalcReward >= 5000,
                                                Patch(改善提案メイン, mainRec, {Status: {Value: "部長評価中"}}),
                                                Patch(改善提案メイン, mainRec, {
                                                    Status: {Value: "承認済"},
                                                    FinalRewardAmount: varCalcReward
                                                })
                                            ),
                                            Patch(改善提案メイン, mainRec, {
                                                Status: {Value: "承認済"},
                                                FinalRewardAmount: varCalcReward
                                            })
                                        )
                                    );
                                    // --- Step 4: 完了ポップアップ表示（確認後にアプリ終了） ---
                                    Set(varConfirmAction, "approved");
                                    Set(varShowConfirmPopup, true)
                                )    // If(!varConfirmed) 閉じ
                                )    // If(varEvalIsReviewer) 閉じ
                              Text: ="承認"
                              Width: =120
                  - Container5:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutMinHeight: =20
                        LayoutMinWidth: =16
                        X: =40
                        Y: =40
      - cntEvalConfirmOverlay:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(0, 0, 0, 0.4)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Vertical
            LayoutJustifyContent: =LayoutJustifyContent.Center
            Visible: =varShowConfirmPopup
            Width: =Parent.Width
          Children:
            - cntEvalConfirmDialog:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.Center
                  DropShadow: =DropShadow.Bold
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =20
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  PaddingBottom: =24
                  PaddingLeft: =32
                  PaddingRight: =32
                  PaddingTop: =24
                  RadiusBottomLeft: =12
                  RadiusBottomRight: =12
                  RadiusTopLeft: =12
                  RadiusTopRight: =12
                  Width: =400
                Children:
                  - lblEvalConfirmTitle:
                      Control: Text@0.0.51
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        Size: =18
                        Text: |
                          =If(
                              varConfirmAction in ["approved", "rejected", "reviewer_approved", "reviewer_dismissed"],
                              "完了",
                              "確認"
                          )
                        Weight: ='TextCanvas.Weight'.Bold
                        Width: =Parent.Width - 64
                  - lblEvalConfirmMessage:
                      Control: Text@0.0.51
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        Text: |
                          =If(
                              varConfirmAction = "approve",
                              "この改善提案を承認しますか？",
                              varConfirmAction = "reject",
                              "この改善提案を差戻しますか？",
                              varConfirmAction = "approved",
                              "承認しました",
                              varConfirmAction = "rejected",
                              "差戻しました",
                              varConfirmAction = "reviewer_approved",
                              "回覧承認しました",
                              varConfirmAction = "reviewer_dismissed",
                              "差戻しました",
                              "処理が完了しました"
                          )
                        Width: =Parent.Width - 64
                  - cntEvalConfirmButtons:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =50
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =16
                        LayoutJustifyContent: =LayoutJustifyContent.Center
                      Children:
                        - btnEvalConfirmCancel:
                            Control: Button@0.0.45
                            Properties:
                              Appearance: ='ButtonCanvas.Appearance'.Secondary
                              Height: =40
                              OnSelect: =Set(varShowConfirmPopup, false)
                              Text: ="キャンセル"
                              Visible: =!(varConfirmAction in ["approved", "rejected", "reviewer_approved", "reviewer_dismissed"])
                              Width: =130
                        - btnEvalConfirmOK:
                            Control: Button@0.0.45
                            Properties:
                              Appearance: ='ButtonCanvas.Appearance'.Primary
                              Height: =40
                              OnSelect: |
                                =Set(varShowConfirmPopup, false);
                                If(
                                    varConfirmAction in ["approved", "rejected", "reviewer_approved", "reviewer_dismissed"],
                                    // 完了確認 → サンクス画面へ遷移 [§12]
                                    Set(varThankYouMessage, "承認ありがとうございました。");
                                    Navigate(ThankYouScreen, ScreenTransition.None),
                                    // 承認/差戻確認 → 実処理実行
                                    Set(varConfirmed, true);
                                    If(
                                        varConfirmAction = "approve",
                                        Select(btnEvalApprove),
                                        Select(btnEvalReject)
                                    )
                                )
                              Text: |
                                =If(
                                    varConfirmAction in ["approved", "rejected", "reviewer_approved", "reviewer_dismissed"],
                                    "確認",
                                    varConfirmAction = "approve",
                                    "承認する",
                                    "差戻する"
                                )
                              Width: =130
      - cntEvalAttachPreviewOverlay:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(0, 0, 0, 0.6)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Vertical
            LayoutJustifyContent: =LayoutJustifyContent.Center
            Visible: =varShowAttachPreview
            Width: =Parent.Width
          Children:
            - cntEvalAttachPreviewDialog:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.Center
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =Parent.Height * 0.85
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =10
                  PaddingBottom: =15
                  PaddingLeft: =15
                  PaddingRight: =15
                  PaddingTop: =15
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  Width: =Parent.Width * 0.8
                Children:
                  - imgEvalAttachPreview:
                      Control: Image@2.2.3
                      Properties:
                        Height: =Parent.Height - 80
                        Image: =varViewAttachImage
                        Width: =Parent.Width - 30
                  - btnEvalCloseAttachPreview:
                      Control: Button@0.0.45
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Secondary
                        Height: =36
                        OnSelect: =Set(varShowAttachPreview, false)
                        Text: ="閉じる"
                        Width: =100
