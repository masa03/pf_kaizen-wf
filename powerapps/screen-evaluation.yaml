Screens:
  EvaluationScreen:
    Properties:
      OnVisible: |
        =// ============================================================
        // 評価画面 OnVisible（タスク: 2-5）
        // ============================================================
        // --- Step 0: Param()フォールバック ---
        // App.StartScreen が App.OnStart より先に評価されるため、
        // OnVisible 発火時点で varEvalRequestID が未セットの場合がある
        If(
            !IsBlank(Param("RequestID")) && IsBlank(varEvalRequestID),
            Set(varEvalRequestID, Param("RequestID"));
            Set(varEvalEvaluatorType, Param("EvalType"))
        );
        // Reviewerフラグは常にParam()から判定（varEvalRequestIDのセット状況に依存しない）[§3]
        If(Param("Mode") = "Reviewer", Set(varEvalIsReviewer, true));
        // --- Step 1: 対象申請データを取得 ---
        With(
            {req: LookUp(改善提案メイン, RequestID = varEvalRequestID)},
            Set(varViewApplicantGID, req.ApplicantGID);
            Set(varViewApplicantName, req.ApplicantName);
            Set(varViewAwardCategory, req.AwardCategory.Value);
            Set(varViewDept, req.Department);
            Set(varViewDivision, req.Division);
            Set(varViewBu, req.Bu);
            Set(varViewSection, req.Section);
            Set(varViewUnit, req.Unit);
            Set(varViewTheme, req.Theme);
            Set(varViewProblem, req.Problem);
            Set(varViewImprovement, req.Improvement);
            Set(varViewCompletionDate, req.CompletionDate);
            Set(varViewTotalEffect, req.TotalEffectAmount);
            Set(varViewStatus, req.Status.Value);
            Set(varViewManagerName, LookUp(社員マスタ, Email = req.ApproverManager.Email, EmployeeName));
            Set(varViewDirectorName, LookUp(社員マスタ, Email = req.ApproverDirector.Email, EmployeeName));
            Set(varViewRequestID, req.RequestID);
            // 表彰区分スキップ判定
            Set(varEvalRequiresScoring, req.AwardCategory.Value = "改善提案");
            // 表彰区分固定金額（スキップ時）
            If(
                !varEvalRequiresScoring,
                Set(
                    varEvalAwardReward,
                    LookUp(表彰区分マスタ, AwardName = req.AwardCategory.Value).RewardAmount
                )
            );
            // 申請者の管理職フラグ取得（職能換算用）
            Set(
                varEvalIsManagement,
                LookUp(社員マスタ, GID = req.ApplicantGID).IsManagement
            )
        );
        // --- Step 2: 改善分野実績を取得（委任警告回避パターン） ---
        ClearCollect(
            _tempEvalCategories,
            Filter(改善分野実績, RequestID = varEvalRequestID)
        );
        Clear(colViewCategories);
        ForAll(
            _tempEvalCategories As catRec,
            Collect(
                colViewCategories,
                {
                    CategoryCode: catRec.CategoryCode,
                    CategoryName: catRec.CategoryName,
                    CategoryType: catRec.Formula,
                    Unit: LookUp(colCategoryMaster, CategoryCode = catRec.CategoryCode).Unit,
                    ConversionRate: catRec.ConversionRate,
                    ActualValue: catRec.ActualValue,
                    WIPAmount: catRec.WIPAmount,
                    Comment: catRec.Comment,
                    EffectAmount: catRec.EffectAmount,
                    SortOrder: catRec.SortOrder
                }
            )
        );
        // --- Step 3: 改善メンバーを取得 ---
        ClearCollect(
            colViewMembers,
            Filter(改善メンバー, RequestID = varEvalRequestID)
        );
        // --- Step 3.5: 添付ファイルを取得（タスク: 2-7） ---
        // ※ ForAll内の日本語列名はCode Viewペーストで解決不可。
        // ※ Power Apps Studioの数式バーで手動入力すること。
        ClearCollect(
            colViewAttachments,
            ForAll(
                Filter(添付ファイル, リクエストID = varEvalRequestID),
                {
                    FileName: If(
                        StartsWith(ThisRecord.拡張子付きのファイル名, varEvalRequestID & "_"),
                        Mid(ThisRecord.拡張子付きのファイル名, Len(varEvalRequestID) + 2),
                        ThisRecord.拡張子付きのファイル名
                    ),
                    FileLink: gSharePointSiteUrl & "/" & ThisRecord.'完全パス ',
                    FileCategory: ThisRecord.ファイル種別.Value,
                    IsImage: Lower(Last(Split(ThisRecord.拡張子付きのファイル名, ".")).Value) in ["jpg", "jpeg", "png", "gif"]
                }
            )
        );
        // --- Step 3.6: 改善前後画像リンクの取得（画像ファイルのみ抽出） ---
        Set(
            varViewBeforeImageLink,
            LookUp(colViewAttachments, FileCategory = "改善前" && IsImage).FileLink
        );
        Set(
            varViewAfterImageLink,
            LookUp(colViewAttachments, FileCategory = "改善後" && IsImage).FileLink
        );
        // --- Step 4: 既存の自分の評価データを取得（差戻→再評価時のデフォルト値復元用） ---
        Set(
            varEvalPreviousData,
            LookUp(
                評価データ,
                RequestID = varEvalRequestID
                && EvaluatorType.Value = varEvalEvaluatorType
            )
        );
        // --- Step 4b: 部長評価時、課長の評価データをデフォルト値として取得 ---
        If(
            varEvalEvaluatorType = "部長",
            Set(
                varEvalManagerData,
                LookUp(
                    評価データ,
                    RequestID = varEvalRequestID
                    && EvaluatorType.Value = "課長"
                    && Decision.Value = "承認"
                )
            ),
            Set(varEvalManagerData, Blank())
        );
        // --- Step 5: 4軸評価スコア選択肢テーブル（Radio Items / DefaultSelectedItems 共用） ---
        Set(
            varEvalScoreOptions,
            Table(
                {Value: "20 　", Score: 20},
                {Value: "18 　", Score: 18},
                {Value: "16 　", Score: 16},
                {Value: "14 　", Score: 14},
                {Value: "10 　", Score: 10},
                {Value: "8 　", Score: 8},
                {Value: "4 　", Score: 4},
                {Value: "2 　", Score: 2}
            )
        );
        // --- Step 6: ①効果 排他制御変数の初期化 ---
        // 優先順: 部長→課長データ引継ぎ、再評価→自分の前回データ復元、初回→空
        If(
            varEvalEvaluatorType = "部長" && !IsBlank(varEvalManagerData),
            Set(varEvalEffectCalcFlag, varEvalManagerData.EffectCalcFlag);
            Set(varEvalEffectScore, varEvalManagerData.EffectScore),
            !IsBlank(varEvalPreviousData),
            Set(varEvalEffectCalcFlag, varEvalPreviousData.EffectCalcFlag);
            Set(varEvalEffectScore, varEvalPreviousData.EffectScore),
            Set(varEvalEffectCalcFlag, false);
            Set(varEvalEffectScore, 0)
        );
        // --- Step 7: 回覧メンバーコレクション取得（§3） ---
        ClearCollect(colViewReviewers, Filter(回覧メンバー, RequestID = varEvalRequestID));
        // --- Step 8: 取下げメッセージ判定（§9） ---
        If(
            varViewStatus = "取下げ",
            Set(varEvalStatusMessage, "この申請は申請者により取り下げられました"),
            Set(varEvalStatusMessage, Blank())
        )
