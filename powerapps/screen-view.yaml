                          =Set(varViewRequestID, txtViewTestID.Value);
                          Set(varViewMode, "View");
                          // データ再取得のためOnVisibleロジックを再実行
                          With(
                              {req: LookUp(改善提案メイン, RequestID = txtViewTestID.Value)},
