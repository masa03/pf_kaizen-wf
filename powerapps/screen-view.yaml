Screens:
  ViewScreen:
    Properties:
      OnVisible: |
        =// 閲覧モード（View）: SharePointリストからデータ取得
        If(
            varViewMode = "View",
            With(
                {req: LookUp(改善提案メイン, RequestID = varViewRequestID)},
                Set(varViewApplicantGID, req.ApplicantGID);
                Set(varViewApplicantName, req.ApplicantName);
                Set(varViewAwardCategory, req.AwardCategory.Value);
                Set(varViewDept, req.Department);
                Set(varViewDivision, req.Division);
                Set(varViewBu, req.Bu);
                Set(varViewSection, req.Section);
                Set(varViewUnit, req.Unit);
                Set(varViewTheme, req.Theme);
                Set(varViewProblem, req.Problem);
                Set(varViewImprovement, req.Improvement);
                Set(varViewCompletionDate, req.CompletionDate);
                Set(varViewTotalEffect, req.TotalEffectAmount);
                Set(varViewStatus, req.Status.Value);
                Set(varViewManagerName, req.ApproverManager.DisplayName);
                Set(varViewDirectorName, req.ApproverDirector.DisplayName);
                Set(varViewFinalReward, req.FinalRewardAmount)
            );
            // Filter→ClearCollectで委任をSharePointに委譲してからローカルで変換
            ClearCollect(
                _tempCategories,
                Filter(改善分野実績, RequestID = varViewRequestID)
            );
            Clear(colViewCategories);
            ForAll(
                _tempCategories As catRec,
                Collect(
                    colViewCategories,
                    {
                        CategoryCode: catRec.CategoryCode,
                        CategoryName: catRec.CategoryName,
                        CategoryType: catRec.Formula,
                        Unit: LookUp(colCategoryMaster, CategoryCode = catRec.CategoryCode).Unit,
                        ConversionRate: catRec.ConversionRate,
                        ActualValue: catRec.ActualValue,
                        WIPAmount: catRec.WIPAmount,
                        Comment: catRec.Comment,
                        EffectAmount: catRec.EffectAmount,
                        SortOrder: 0
                    }
                )
            );
            ClearCollect(
                colViewMembers,
                Filter(改善メンバー, RequestID = varViewRequestID)
            );
            // 添付ファイル取得（タスク: 2-7）
            // ※ ForAll内の日本語列名はCode Viewペーストで解決不可。
            // ※ Power Apps Studioの数式バーで手動入力すること。
            ClearCollect(
                colViewAttachments,
                ForAll(
                    Filter(添付ファイル, RequestID = varViewRequestID),
                    {
                        FileName: ThisRecord.拡張子付きのファイル名,
                        FileLink: gSharePointSiteUrl & "/" & ThisRecord.'完全パス ',
                        FileCategory: ThisRecord.ファイル種別.Value
                    }
                )
            );
            // 改善前後画像リンクの抽出（タスク: 5-B-1）
            Set(
                varViewBeforeImageLink,
                LookUp(colViewAttachments, FileCategory = "改善前").FileLink
            );
            Set(
                varViewAfterImageLink,
                LookUp(colViewAttachments, FileCategory = "改善後").FileLink
            );
            // 評価データ取得（タスク: 5-B-2）
            ClearCollect(
                _tempEvalData,
                Filter(評価データ, RequestID = varViewRequestID)
            );
            Set(
                varViewManagerEval,
                LookUp(_tempEvalData, EvaluatorType.Value = "課長")
            );
            Set(
                varViewDirectorEval,
                LookUp(_tempEvalData, EvaluatorType.Value = "部長")
            )
        );
        // プレビューモード: 画像リンクをbase64から設定（タスク: 5-B-1）
        If(
            varViewMode = "Preview",
            Set(
                varViewBeforeImageLink,
                LookUp(colViewAttachments, FileCategory = "改善前").ContentBase64
            );
            Set(
                varViewAfterImageLink,
                LookUp(colViewAttachments, FileCategory = "改善後").ContentBase64
            )
        )
    Children:
      - cntViewOuter:
